name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build frontend
        working-directory: artifacts/bluehazy-fm
        env:
          BASE_PATH: /BlueHazy-fm/
          VITE_API_URL: https://bluehazy-fm-api.onrender.com
          npm_config_ignore_scripts: "false"
        run: |
          echo "=== npm config ==="
          npm config list
          echo "=== installing ==="
          npm install --include=dev --legacy-peer-deps
          echo "=== node_modules/.bin contents ==="
          ls node_modules/.bin/ | grep -i vite || echo "vite NOT found in .bin"
          echo "=== building ==="
          node_modules/.bin/vite build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/bluehazy-fm/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
