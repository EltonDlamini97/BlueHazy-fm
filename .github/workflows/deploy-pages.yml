name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Copy frontend to a completely isolated directory outside the repo
      # so that no parent package.json / pnpm-workspace.yaml interferes
      - name: Isolate and build frontend
        env:
          BASE_PATH: /BlueHazy-fm/
          VITE_API_URL: https://bluehazy-fm-api.onrender.com
        run: |
          # Copy frontend to a clean directory outside the repo
          cp -r artifacts/bluehazy-fm /tmp/bluehazy-build
          # Remove any .npmrc that might have ignore-scripts
          rm -f /tmp/bluehazy-build/.npmrc
          cd /tmp/bluehazy-build
          # Fresh install with no workspace interference
          npm install --legacy-peer-deps
          echo "installed $(ls node_modules/.bin | wc -l) binaries"
          ls node_modules/.bin | grep vite || echo "vite not found"
          # Build
          npm run build

      - name: Copy build output
        run: cp -r /tmp/bluehazy-build/dist artifacts/bluehazy-fm/dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/bluehazy-fm/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
