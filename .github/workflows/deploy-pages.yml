name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Copy frontend to a clean temp dir so no parent .npmrc interferes
      - name: Copy frontend to clean workspace
        run: |
          cp -r artifacts/bluehazy-fm /tmp/bluehazy-fm
          # Remove any inherited npmrc that might block scripts
          rm -f /tmp/bluehazy-fm/.npmrc

      - name: Install frontend dependencies
        working-directory: /tmp/bluehazy-fm
        env:
          NODE_ENV: development
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: /tmp/bluehazy-fm
        env:
          NODE_ENV: production
          BASE_PATH: /BlueHazy-fm/
          VITE_API_URL: https://bluehazy-fm-api.onrender.com
        run: npm run build

      - name: Copy dist back
        run: cp -r /tmp/bluehazy-fm/dist artifacts/bluehazy-fm/dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/bluehazy-fm/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
