commandOrigin = "config"
command = "npm install -g pnpm@11.1.1 && pnpm install --ignore-scripts --no-frozen-lockfile && pnpm --filter @workspace/bluehazy-fm run build"

[build.environment]
NODE_VERSION = "22"
NPM_FLAGS = "--no-optional"

