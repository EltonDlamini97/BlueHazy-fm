kind = "web"
previewPath = "/"
title = "BlueHazy FM"
version = "1.0.0"
id = "artifacts/bluehazy-fm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18469

[services.development]
run = "pnpm --filter @workspace/bluehazy-fm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bluehazy-fm", "run", "build" ]
publicDir = "artifacts/bluehazy-fm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18469"
BASE_PATH = "/"
