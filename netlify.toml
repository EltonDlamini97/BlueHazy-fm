[build]
  # Monorepo: install from repo root, build frontend only (matches vercel.json)
  command = "corepack enable && corepack prepare pnpm@11.1.1 --activate && pnpm install --frozen-lockfile && pnpm --filter @workspace/bluehazy-fm run build"
  publish = "artifacts/bluehazy-fm/dist/public"

[build.environment]
  NODE_VERSION = "24"
  VITE_API_URL = "https://bluehazy-fm-api.onrender.com"

# Proxy /api/* to the Render API server
[[redirects]]
  from = "/api/*"
  to = "https://bluehazy-fm-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
