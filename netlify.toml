[build]
  command = "npm install -g pnpm@11.1.1 && pnpm install --ignore-scripts --no-frozen-lockfile && pnpm --filter @workspace/bluehazy-fm run build"
  publish = "artifacts/bluehazy-fm/dist/public"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--no-optional"
  VITE_API_URL = "https://bluehazy-fm-api.onrender.com"

# Proxy /api/* to the Render API server
[[redirects]]
  from = "/api/*"
  to = "https://bluehazy-fm-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
